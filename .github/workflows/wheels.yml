name: Build NumPy Wheels for Python 3.15 Pre-release

on:
  # 允许手动触发
  workflow_dispatch:

jobs:
  build-win-amd64:
    name: Build wheel for Python 3.15 on Windows AMD64
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 确保获取所有历史和子模块，NumPy 依赖此
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python 3.15 (pre-release)
        uses: actions/setup-python@v5
        with:
          # 指定具体的预发布版本号，例如 '3.15.0b2'
          # 您可以在此查看所有可用版本：https://github.com/actions/python-versions
          python-version: '3.15'
          architecture: 'x64' # 指定 AMD64 架构

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          # 安装 NumPy 的构建系统依赖
          pip install meson meson-python ninja
          # 安装其他可能需要的编译工具 (NumPy 通常需要)
          # pip install cython pytest

      - name: Build wheel
        run: |
          # 使用 meson-python 构建 wheel
          # 此命令会编译 C 扩展并打包成 wheel
          python -m build --wheel --no-isolation

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: numpy-cp315-win_amd64-wheel
          path: dist/*.whl
          retention-days: 14 # 保留天数

      # 可选：在同一个 job 中测试刚构建的 wheel
      - name: Test the built wheel
        run: |
          # 安装刚构建的 wheel
          pip install dist/*.whl
          # 运行一个简单的测试，确保能导入和基本使用
          python -c "import numpy as np; print(np.__version__); print(np.array([1, 2, 3]))"
