name: Build NumPy Wheel (cp315 Windows AMD64)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build cp315 wheel on Windows AMD64
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cibuildwheel
        run: |
          python -m pip install --upgrade pip
          pip install cibuildwheel

      - name: Build wheel
        env:
          CIBW_BUILD: 'cp315-win_amd64'
          CIBW_BUILD_FRONTEND: 'build'
          CIBW_BEFORE_BUILD: 'python -m pip install meson meson-python ninja'
          CIBW_TEST_COMMAND: 'python -c "import numpy as np; print(np.__version__); print(np.array([1, 2, 3]))"'
        run: |
          python -m cibuildwheel --output-dir dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: numpy-cp315-win_amd64-wheel
          path: dist/*.whl
          retention-days: 14
